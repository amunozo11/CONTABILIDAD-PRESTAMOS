name: CI — GotaGota

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ──────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        env:
          MONGODB_URI: mongodb://localhost:27017/gotagota_test
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          NODE_ENV: test
          TZ: America/Bogota

      - name: Integration tests
        run: npm run test:integration
        env:
          MONGODB_URI: mongodb://localhost:27017/gotagota_test
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          NODE_ENV: test
          TZ: America/Bogota

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  # ─── Frontend Tests ─────────────────────────────────────────
  frontend-test:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api-prestamos.kimjuhogar.com
          NEXT_PUBLIC_WS_URL: wss://api-prestamos.kimjuhogar.com
          NEXT_PUBLIC_APP_URL: https://prestamos.kimjuhogar.com
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: test_vapid_key

  # ─── Docker Build Check ─────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: gotagota-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: gotagota-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
