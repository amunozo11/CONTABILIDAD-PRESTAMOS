# ─── HTTP → HTTPS Redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name prestamos.kimjuhogar.com api-prestamos.kimjuhogar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend: prestamos.kimjuhogar.com ──────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prestamos.kimjuhogar.com;

    ssl_certificate     /etc/nginx/ssl/prestamos.kimjuhogar.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/prestamos.kimjuhogar.com/privkey.pem;

    # ─── CSP para PWA ────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com blob:; connect-src 'self' https://api-prestamos.kimjuhogar.com wss://api-prestamos.kimjuhogar.com; worker-src 'self'; manifest-src 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Service Worker ──────────────────────────────────────
    location /sw.js {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_hide_header Cache-Control;
    }

    # ─── Static assets con cache largo ──────────────────────
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid 200 1y;
    }

    # ─── App principal ───────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── Backend API: api-prestamos.kimjuhogar.com ───────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-prestamos.kimjuhogar.com;

    ssl_certificate     /etc/nginx/ssl/api-prestamos.kimjuhogar.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api-prestamos.kimjuhogar.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Auth endpoints — rate limit estricto ────────────────
    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend:4000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── WebSocket (Socket.IO) ───────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── API REST ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://backend:4000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Health check ────────────────────────────────────────
    location /health {
        proxy_pass http://backend:4000;
        access_log off;
    }

    # ─── Bloquear rutas no autorizadas ───────────────────────
    location / {
        return 404;
    }
}
